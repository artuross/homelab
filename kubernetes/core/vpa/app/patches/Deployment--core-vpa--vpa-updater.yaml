apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-updater
  namespace: kube-system
spec:
  template:
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: updater
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
